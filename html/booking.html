<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmation | Showbookie</title>
    <link rel="stylesheet" href="/css/moviestyle.css" />
</head>
<body>
    <header>
        <a class="logo" href="/movie.html">Show<span>bookie</span></a>
        <div class="search-box">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="movie-search" type="text" placeholder="Search for Movies" autocomplete="off" />
            <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>
        <div id="user-info" class="user-menu">
            <span id="username" class="username-label"></span>
            <button id="profile-trigger" class="profile-trigger" type="button" aria-label="Profile options">
                <span id="profile-avatar" class="profile-avatar">U</span>
            </button>
            <div class="profile-dropdown">
                <a href="#" data-action="profile-info">Profile info</a>
                <a href="/html/bookinghist.html">Booking history</a>
                <button type="button" data-action="theme">Theme: Light</button>
                <a href="#" data-action="settings">Settings</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </header>

    <nav>
        <a href="/html/list.html">Movies</a>
        <a href="/html/bookinghist.html">Booking History</a>
        <a href="/html/about.html">About</a>
        <a href="/html/contact.html">Contact us</a>
    </nav>

    <main class="main-content">
      <section class="page-panel booking-success">
        <h1>Booking Successful!</h1>

        <div class="section">
            <h2>Details</h2>
            <div class="booking-details">
                <p><strong>Movie:</strong> <span id="movie-name"></span></p>
                <p><strong>Showtime:</strong> <span id="showtime"></span></p>
                <p><strong>Theater:</strong> <span id="theater-name"></span></p>
                <p><strong>Selected Seats:</strong></p>
                <div class="selected-seats" id="selected-seats">
                </div>
            </div>
        </div>

        <div class="home-button">
            <button onclick="window.location.href='/html/movie.html'">Return to Home</button>
        </div>
      </section>
    </main>

    <div class="stream-banner">
        <span>Endless Entertainment Anytime, Anywhere!</span>
    </div>

    <script src="/shell.js"></script>

    <script>
        const latestBooking = JSON.parse(localStorage.getItem('latestBooking') || '{}');
        const selectedSeats = latestBooking.selectedSeats || JSON.parse(localStorage.getItem('selectedSeats') || '[]');
        const showtime = localStorage.getItem('showtime');
        const fallbackMovie = localStorage.getItem('movieTitle');
        const fallbackTheater = localStorage.getItem('theater');

        document.getElementById('movie-name').innerText = latestBooking.movieTitle || fallbackMovie || 'Not available';
        document.getElementById('showtime').innerText = showtime || latestBooking.showTime || 'Not available';
        document.getElementById('theater-name').innerText = latestBooking.theaterName || fallbackTheater || 'Not available';

        const selectedSeatsContainer = document.getElementById('selected-seats');
        if (selectedSeats.length > 0) {
            selectedSeats.forEach(seat => {
                const seatElement = document.createElement('div');
                seatElement.classList.add('seat');
                seatElement.innerText = seat;
                selectedSeatsContainer.appendChild(seatElement);
            });
        } else {
            selectedSeatsContainer.innerHTML = '<p>No seats selected.</p>';
        }
    </script>
</body>
</html>
