<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Showbookie</title>
    <link rel="stylesheet" href="/css/moviestyle.css">
</head>
<body>
    <header>
        <a class="logo" href="/movie.html">Show<span>bookie</span></a>
        <div class="search-box">
            <span class="search-icon" aria-hidden="true"></span>
            <input id="movie-search" type="text" placeholder="Search for Movies" autocomplete="off" />
            <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>
        <div id="user-info" class="user-menu">
            <span id="username" class="username-label"></span>
            <button id="profile-trigger" class="profile-trigger" type="button" aria-label="Profile options">
                <span id="profile-avatar" class="profile-avatar">U</span>
            </button>
            <div class="profile-dropdown">
                <a href="/html/profile.html" data-action="profile-info">Profile info</a>
                <a href="/html/bookinghist.html">Booking history</a>
                <button type="button" data-action="theme">Theme: Light</button>
                <a href="#" data-action="settings">Settings</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </header>

    <nav>
        <a href="/html/list.html">Movies</a>
        <a href="/html/bookinghist.html">Booking History</a>
        <a href="/html/about.html">About</a>
        <a href="/html/contact.html">Contact us</a>
    </nav>

    <main class="main-content">
        <section class="page-panel profile-card">
            <div class="profile-avatar-lg" id="profile-avatar-lg">U</div>
            <h1 class="page-title" id="profile-name">Loading…</h1>
            <div class="profile-details">
                <div class="profile-field">
                    <span class="profile-label">Email</span>
                    <span class="profile-value" id="profile-email">—</span>
                </div>
                <div class="profile-field">
                    <span class="profile-label">User ID</span>
                    <span class="profile-value" id="profile-uid">—</span>
                </div>
            </div>
        </section>
    </main>

    <div class="stream-banner">
        <span>Endless Entertainment Anytime, Anywhere!</span>
    </div>

    <script src="/shell.js"></script>
    <script>
        (async function () {
            try {
                const res = await fetch('/get-user');
                if (!res.ok) return;
                const user = await res.json();
                const name = user.username || 'Unknown';
                const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

                document.getElementById('profile-avatar-lg').textContent = initials;
                document.getElementById('profile-name').textContent = name;
                document.getElementById('profile-email').textContent = user.email || 'Not available';
                document.getElementById('profile-uid').textContent = user.userId ?? 'N/A';
            } catch (e) {
                console.error('Failed to load profile', e);
            }
        })();
    </script>
</body>
</html>
